    const GRID_LEFT = 108, GRID_W = 597, GRID_H = 620;

    function DraggableGrid() {
      const [positions, setPositions] = useState(() => {
        const init = {};
        photos.forEach(p => { init[p.id] = { x: p.initialX, y: p.initialY }; });
        return init;
      });
      const [zOrder, setZOrder] = useState(photos.map(p => p.id));
      const dragRef = useRef(null);

      const onMouseDown = useCallback((e, photo) => {
        e.preventDefault();
        const pos = positions[photo.id];
        dragRef.current = { id: photo.id, startX: e.clientX, startY: e.clientY, origX: pos.x, origY: pos.y, outerW: photo.outerW, outerH: photo.outerH };
        setZOrder(prev => [...prev.filter(id => id !== photo.id), photo.id]);
      }, [positions]);

      useEffect(() => {
        const onMove = e => {
          if (!dragRef.current) return;
          const { id, startX, startY, origX, origY, outerW, outerH } = dragRef.current;
          const x = Math.max(0, Math.min(origX + e.clientX - startX, GRID_W - outerW));
          const y = Math.max(0, Math.min(origY + e.clientY - startY, GRID_H - outerH));
          setPositions(prev => ({ ...prev, [id]: { x, y } }));
        };
        const onUp = () => { dragRef.current = null; };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
      }, []);

      return (
        <div style={{ position:'absolute', left:GRID_LEFT, top:0, width:GRID_W, height:GRID_H, overflow:'hidden' }}>
          {zOrder.map((id, zIdx) => {
            const p = photos.find(ph => ph.id === id);
            const pos = positions[id];
            return (
              <div key={id} onMouseDown={e => onMouseDown(e, p)}
                style={{ position:'absolute', left:pos.x, top:pos.y, width:p.outerW, height:p.outerH, zIndex:zIdx+1, cursor:'grab', display:'flex', alignItems:'center', justifyContent:'center', userSelect:'none' }}>
                <div style={{ flexShrink:0, transform:`rotate(${p.rotation}deg)` }}>
                  {p.isSticker ? (
                    <div style={{ position:'relative', width:p.innerW, height:p.innerH }}>
                      <img src={p.src} alt={p.alt} draggable={false} style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', pointerEvents:'none', maxWidth:'none' }} />
                    </div>
                  ) : (
                    <div style={{ position:'relative', width:p.innerW, height:p.innerH }}>
                      <div style={{ position:'absolute', inset:0, pointerEvents:'none' }}>
                        {p.hasBg && <div style={{ position:'absolute', inset:0, background:'#d9d9d9' }} />}
                        <div style={{ position:'absolute', inset:0, overflow:'hidden' }}>
                          {p.useCover
                            ? <img src={p.src} alt={p.alt} draggable={false} style={{ width:'100%', height:'100%', objectFit:'cover', pointerEvents:'none' }} />
                            : <img src={p.src} alt={p.alt} draggable={false} style={{ position:'absolute', height:p.imgH, left:p.imgL, top:p.imgT, width:p.imgW, maxWidth:'none', pointerEvents:'none' }} />
                          }
                        </div>
                      </div>
                      {p.borderPx != null && (
                        <div style={{ position:'absolute', inset:p.borderInset??'0px', border:`${p.borderPx}px solid #d9d9d9`, pointerEvents:'none' }} />
                      )}
                    </div>

            );

        if (m.includes('skill')) return botResponses.skills;
        if (m.includes('frc')||m.includes('robot')) return botResponses.frc;
        if (m.includes('hack')||m.includes('club')) return botResponses.hack;
        return botResponses.default;
      };

      const send = text => {
        if (!text.trim()) return;
        setMessages(p => [...p, { id:Date.now().toString(), text, sender:'user' }]);
        setInput('');
        setTimeout(() => setMessages(p => [...p, { id:(Date.now()+1).toString(), text:getResponse(text), sender:'bot' }]), 420);
      };

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

      return (
        <div style={{ height:'100%', width:'100%', display:'flex', flexDirection:'column', overflow:'hidden', background:'#1c1c1c', border:'2px solid #0055ff' }}>
          {/* Tab bar */}
          <div style={{ display:'flex', alignItems:'stretch', borderBottom:'2px solid #0055ff', flexShrink:0, background:'#161616' }}>
            <div style={{ padding:'10px 20px', borderRight:'1px solid #0055ff44', background:'#1c1c1c', borderBottom:'2px solid #1c1c1c', marginBottom:'-2px' }}>

            <div style={{ padding:'10px 20px', borderRight:'1px solid #0055ff22', opacity:0.35 }}>
              <span style={{ fontFamily:"'Libre Baskerville', serif", fontSize:13, color:'#0055ff' }}>chat.log</span>
            </div>
            <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'flex-end', paddingRight:14 }}>
              <div style={{ display:'flex', gap:6 }}>
                <span style={{ width:10, height:10, borderRadius:'50%', background:'#ff5f56', display:'block' }} />
                <span style={{ width:10, height:10, borderRadius:'50%', background:'#ffbd2e', display:'block' }} />
                <span style={{ width:10, height:10, borderRadius:'50%', background:'#27c93f', display:'block' }} />
              </div>
            </div>
          </div>
          {/* Subheader */}
          <div style={{ padding:'14px 20px 10px', borderBottom:'1px solid #0055ff22', flexShrink:0 }}>
            <p style={{ fontFamily:"'Micro 5', sans-serif", fontSize:28, color:'#0055ff', margin:0 }}>victoria.ai</p>
            <p style={{ fontFamily:"'Libre Baskerville', serif", fontSize:11, color:'#0055ff', opacity:0.5, margin:'3px 0 0 0' }}>trained on my resume, projects &amp; job descriptions</p>
          </div>
          {/* Messages */}
          <div style={{ flex:1, overflowY:'auto', padding:'16px 16px 8px', display:'flex', flexDirection:'column', gap:12 }}>
            {messages.map(msg => (
              <div key={msg.id} style={{ display:'flex', justifyContent:msg.sender==='user'?'flex-end':'flex-start' }}>
                <div style={msg.sender==='bot'
                  ? { background:'#1e1e1e', border:'1px solid #0055ff2a', color:'#cfcfcf', fontFamily:"'Libre Baskerville', serif", fontSize:12, padding:'9px 13px', maxWidth:'88%', lineHeight:1.65 }
                  : { background:'#0055ff', color:'#fff', fontFamily:"'Libre Baskerville', serif", fontSize:12, padding:'9px 13px', maxWidth:'88%', lineHeight:1.65 }}>
                  {msg.text}
                </div>
              </div>
            ))}
            <div ref={bottomRef} />
          </div>
          {/* Suggested */}
          {messages.length <= 2 && (
            <div style={{ padding:'0 16px 10px', display:'flex', flexWrap:'wrap', gap:6, flexShrink:0 }}>
              {suggestedQs.map((q,i) => (
                <button key={i} onClick={() => send(q)} onMouseEnter={() => setHoveredQ(i)} onMouseLeave={() => setHoveredQ(null)}
                  style={{ background:hoveredQ===i?'#0055ff14':'transparent', border:'1px solid #0055ff44', color:'#0055ff', fontFamily:"'Libre Baskerville', serif", fontSize:10, padding:'4px 10px', cursor:'pointer' }}>
                  {q}
                </button>
              ))}
            </div>
          )}
          {/* Input */}
          <div style={{ padding:'10px 14px', borderTop:'1px solid #0055ff2a', display:'flex', gap:8, flexShrink:0 }}>
            <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==='Enter'&&send(input)} placeholder="ask me anything..."
              style={{ flex:1, background:'#181818', border:'1px solid #0055ff33', padding:'8px 12px', color:'#d0d0d0', fontFamily:"'Libre Baskerville', serif", fontSize:12, outline:'none' }} />
            <button onClick={() => send(input)} style={{ background:'#0055ff', border:'none', padding:'8px 13px', cursor:'pointer', display:'flex', alignItems:'center', flexShrink:0 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></svg>
            </button>
          </div>
        </div>
      );
    }
